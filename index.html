<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost-NDJ Reborn</title>
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-heavy: rgba(10, 10, 14, 0.96);
            --text-color: #ffffff;
            --bg-color: #050508;
            --bg-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-color);
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            overflow: hidden;
        }

        /* HUB DE ENTRADA (Tela Inicial) */
        #home-hub {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(5, 5, 8, 0.75), rgba(5, 5, 8, 0.85)), var(--bg-image);
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* NAVEGADOR (Iframe incorporado adaptado com margem da topbar) */
        #browser-frame {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
            background: #fff;
            display: none;
            z-index: 5;
        }

        /* TOPBAR DO NAVEGADOR ATIVO */
        .topbar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 60px;
            display: none; 
            align-items: center;
            padding: 0 15px;
            background: #111115;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .url-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            margin-right: 10px;
        }

        .url-static-prefix { color: #666; font-size: 14px; margin-right: 2px; font-family: monospace; }

        .url-input-field {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        .menu-trigger {
            font-size: 26px;
            color: var(--text-color);
            cursor: pointer;
            font-weight: bold;
            width: 38px; height: 38px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .menu-trigger:hover { background: var(--glass); }

        /* DROPDOWN DOS 3 PONTINHOS */
        .dropdown {
            position: absolute;
            top: 65px; right: 15px;
            background: #111115;
            border: 1px solid var(--border);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            width: 220px;
            overflow: hidden;
            z-index: 3000;
        }

        .dropdown-item {
            padding: 14px 15px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }
        .dropdown-item:hover { background: var(--primary); color: white; }

        .settings-trigger {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 18px;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: 0.2s;
        }
        .settings-trigger:hover { background: rgba(255,255,255,0.15); transform: rotate(45deg); }

        .branding {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-img {
            width: 75px;
            height: 75px;
            border-radius: 22px;
            margin-bottom: 15px;
            animation: pulse 3s infinite ease-in-out;
            box-shadow: 0 0 20px var(--primary);
            object-fit: cover;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.06); opacity: 1; box-shadow: 0 0 35px var(--primary); }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .branding h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-container {
            width: 90%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 6px 10px;
            border-radius: 50px;
            width: 100%;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        #url-input {
            flex: 1;
            background: none;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px;
            outline: none;
        }

        .search-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .search-btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* SHORTCUTS */
        .shortcuts {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 100%;
        }

        .shortcut-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .shortcut-item:hover { transform: translateY(-3px); }

        .icon-circle {
            width: 55px;
            height: 55px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 1px solid var(--border);
        }

        /* MODAIS */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--glass-heavy);
            backdrop-filter: blur(20px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #0f0f14;
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            max-width: 460px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .typewriter-text {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #00ff41;
            margin-bottom: 25px;
            min-height: 45px;
            line-height: 1.4;
        }

        /* CONFIGURAÇÃO */
        .config-group { margin-bottom: 18px; }
        .config-group label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        .config-group input[type="text"], .config-group select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 10px; color: white; outline: none; font-size: 14px;
        }
        .config-group input[type="color"] {
            width: 100%; height: 42px; border: 1px solid var(--border); border-radius: 10px; background: transparent; cursor: pointer;
        }
        .file-custom {
            display: block; width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px dashed var(--border); text-align: center; border-radius: 10px; cursor: pointer; font-size: 13px; color: #aaa;
        }
        .file-custom:hover { border-color: var(--primary); color: #fff; }

        .shortcut-manager-list {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .shortcut-manager-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .shortcut-manager-item:last-child { border: none; }
        .del-shortcut-btn { color: var(--danger); cursor: pointer; background: none; border: none; font-size: 16px; }

        .add-shortcut-row {
            display: flex; gap: 8px; margin-top: 10px;
        }
        .add-shortcut-row input { flex: 1; }
        .add-shortcut-btn { background: var(--primary); border: none; color: white; padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="settings-trigger" onclick="toggleModal('settings-modal', true)">⚙️</div>

    <div class="topbar" id="topbar">
        <div class="url-container">
            <span class="url-static-prefix" id="urlPrefix">ghostsearch.gt/</span>
            <input class="url-input-field" id="urlbar" onkeydown="handleBar(event)">
        </div>
        <div class="menu-trigger" onclick="toggleMenu(event)">⋮</div>

        <div class="dropdown" id="menuDropdown">
            <div class="dropdown-item" onclick="goBack()"><span>⬅️</span> Voltar Página</div>
            <div class="dropdown-item" onclick="goHome()"><span>🏠</span> Ir para Home</div>
            <div class="dropdown-item" onclick="openLocalFile()"><span>📄</span> Arquivo Local (ia.html)</div>
            <div class="dropdown-item" onclick="sharePage()"><span>📤</span> Compartilhar Link</div>
            <div class="dropdown-item" onclick="toggleModal('settings-modal', true)" style="border-top:1px solid var(--border); color:var(--primary);"><span>⚙️</span> Configurações</div>
        </div>
    </div>

    <div id="home-hub">
        <div class="branding">
            <img src="https://cdn-icons-png.flaticon.com/512/64/64571.png" id="hub-logo" class="logo-img">
            <h1 id="hub-title">Ghost-NDJ Reborn</h1>
        </div>

        <div class="main-container">
            <div class="search-box">
                <input type="text" id="url-input" placeholder="Pesquisar anonimamente ou digitar link..." onkeydown="checkEnter(event)">
                <button class="search-btn" onclick="navigate()">➔</button>
            </div>

            <div class="shortcuts" id="shortcuts-display"></div>
        </div>
    </div>

    <iframe id="browser-frame" src="about:blank"></iframe>

    <div class="modal-overlay" id="security-modal">
        <div class="modal-content">
            <h2 style="color:var(--danger); margin-bottom:10px; font-size: 18px;">⚠️ PROTOCOLO DE CONEXÃO EXTERNA</h2>
            <div class="typewriter-text" id="modalDesc"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="toggleModal('security-modal', false)" style="flex:1; padding:12px; background:#222; color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600;">Abortar</button>
                <button id="btnProceed" style="flex:1; padding:12px; background:var(--danger); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600;">Proceder</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Customização Externa</h2>
                <button onclick="toggleModal('settings-modal', false)" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
            </div>
            
            <div class="config-group">
                <label>Cor de Destaque (Accent)</label>
                <input type="color" id="cfgPrimary" onchange="updateThemePreview()">
            </div>

            <div class="config-group">
                <label>Plano de Fundo (Imagem da Galeria)</label>
                <label class="file-custom">
                    <span id="file-label">📁 Escolher imagem do dispositivo...</span>
                    <input type="file" id="cfgBgGallery" accept="image/*" style="display:none;" onchange="handleImageUpload(this)">
                </label>
            </div>

            <div class="config-group">
                <label>Motor de Busca do Browser</label>
                <select id="cfgSearchEngine">
<optgroup label="Recomendados⭐">
                    <option value="ghost">SearXNG</option>
<option value="swiss">Swisscows(Esse Motor pode ser lento)</option>
<option value="marginala">Marginala(Esse Motor pode ser lento)</option>
<option value="yep">Yep(Esse Motor pode ser lento)</option>
<option value="bing">Bing</option>
<option value="kiddle">Kiddle</option>
</optgroup>

<optgroup label="Wikipédia🗃️">
                    <option value="wikipedia">Wikipédia</option>
                    <option value="wikitionarypt">WikiTionary(PT)</option>
                    <option value="wikitionaryen">WikiTionary(EN)</option>
<option value="wikilivroen">WikiLivro(EN)</option>
<option value="wikilivropt">WikiLivro(PT)</option>
<option value="wikiversityen">WikiVersity(EN)</option>
<option value="wikiversitypt">WikiVersity(PT)</option>
<option value="specieswikimedia">SpeciesWikimedia</option>
<option value="wikidata">WikiData</option>
</optgroup>


<optgroup label="Outros">
                    <option value="archiver">Archive.org</option>
                    <option value="gutenberg">Gutenberg</option>
                    <option value="algolia">Algolia</option>
</optgroup>
                </select>
            </div>

            <div class="config-group" style="margin-top: 25px;">
                <label>Gerenciar Atalhos Rápidos</label>
                <div class="shortcut-manager-list" id="shortcut-manager-list"></div>
                <div class="add-shortcut-row">
                    <input type="text" id="new-short-name" placeholder="Nome" style="padding: 8px; background: #000; border: 1px solid var(--border); color:#fff; border-radius:6px; font-size:12px;">
                    <input type="text" id="new-short-url" placeholder="URL" style="padding: 8px; background: #000; border: 1px solid var(--border); color:#fff; border-radius:6px; font-size:12px;">
                    <button class="add-shortcut-btn" onclick="addNewShortcut()">Add</button>
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:30px;">
                <button onclick="toggleModal('settings-modal', false)" style="flex:1; padding:12px; background:#181822; color:#fff; border:none; border-radius:10px; cursor:pointer;">Cancelar</button>
                <button onclick="saveConfigurations()" style="flex:1; padding:12px; background:var(--primary); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600;">Aplicar Tudo</button>
            </div>
        </div>
    </div>

    <script>
        const hub = document.getElementById('home-hub');
        const frame = document.getElementById('browser-frame');
        const input = document.getElementById('url-input');
        const topbar = document.getElementById('topbar');

        let currentEngine = "ghost";
        let base64BgData = "";

        const ENGINES = {
            ghost: "https://g-jxlf.onrender.com/search?q=",
            swiss: "https://swisscows.com/web?query=",
            yep: "https://yep.com/web?q=",
            kiddle: "https://www.kiddle.co/ms.php?q=",
            algolia: "https://hn.algolia.com/?query=",
            wikipedia: "https://www.wikipedia.org/wiki/",
            marginala: "https://search.marginalia.nu/search?query=",
            archiver: "https://archive.org/search?query=",
            wikidata: "https://www.wikidata.org/w/index.php?search=",
            wikiversitypt: "https://pt.wikiversity.org/w/index.php?title=Especial:Pesquisar&go=Go&search=",
            wikiversityen: "https://en.wikiversity.org/w/index.php?title=Especial:Pesquisar&go=Go&search=",
            wikilivropt: "https://pt.wikibooks.org/w/index.php?search=",
            wikilivroen: "https://en.wikibooks.org/w/index.php?search=",
            wikitionarypt: "https://pt.wiktionary.org/wiki/",
            wikitionaryen: "https://en.wiktionary.org/wiki/",
            gutenberg: "https://www.gutenberg.org/ebooks/search/?query=",
           specieswikimedia: "https://species.wikimedia.org/wiki/",
            bing: "https://www.bing.com/search?q="
        };

        const SAFE_DOMAINS = ["g-jxlf.onrender.com", "wikipedia.org", "github.com", "google.com", "youtube.com", "developer.mozilla.org", "pitocoofc.github.io", "nexoraofc.github.io", "nexoraincofc.github.io"];
        
        let defaultShortcuts = [
            { name: "SearXNG", url: "https://g-jxlf.onrender.com/search?q=", icon: "🌍" },
            { name: "Wikipédia", url: "https://pt.wikipedia.org/", icon: "🗃️"},
            { name: "bing", url: "https://www.bing.com/search?q=home", icon: "🌐" }
        ];
        let userShortcuts = [];

        window.onload = function() {
            loadSavedSettings();
            renderShortcuts();
        };

        function toggleMenu(e) {
            e.stopPropagation();
            const m = document.getElementById("menuDropdown");
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        }

        window.onclick = (e) => { 
            if(!e.target.matches('.menu-trigger')) document.getElementById("menuDropdown").style.display = "none"; 
        }

        function typeWrite(text, elementId) {
            const el = document.getElementById(elementId);
            el.innerHTML = ""; let i = 0;
            function type() {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; setTimeout(type, 15); }
            }
            type();
        }

        function openPage(url, title) {
            const load = () => {
                frame.src = url;
                frame.style.display = 'block';
                topbar.style.display = 'flex';
                hub.style.opacity = '0';
                setTimeout(() => { hub.style.display = 'none'; }, 400);

                if (url.startsWith("https://") || url.startsWith("http://")) {
                    document.getElementById("urlPrefix").innerText = "";
                    document.getElementById("urlbar").value = url;
                } else {
                    document.getElementById("urlPrefix").innerText = "ghostsearch.gt/";
                    document.getElementById("urlbar").value = title;
                }
            };

            const isSafe = SAFE_DOMAINS.some(d => url.includes(d));
            if (url.startsWith("http") && !isSafe) {
                toggleModal('security-modal', true);
                typeWrite(`ALERTA CRÍTICO: Conexão externa disparada para [${url}]. Deseja ignorar sandbox de metadados do Ghost Search?`, "modalDesc");
                document.getElementById("btnProceed").onclick = () => { toggleModal('security-modal', false); load(); };
            } else { load(); }
        }

        function processInput(text) {
            if(!text) return;
            text = text.trim();
            if (text.includes('.') && !text.includes(' ')) {
                let url = text.startsWith('http') ? text : 'https://' + text;
                openPage(url, text);
            } else {
                let engineUrl = ENGINES[currentEngine] || ENGINES["ghost"];
                openPage(`${engineUrl}${encodeURIComponent(text)}`, text);
            }
        }

        function navigate() { processInput(input.value); }
        function handleBar(e) { if(e.key === 'Enter') processInput(document.getElementById("urlbar").value); }
        function checkEnter(e) { if (e.key === 'Enter') navigate(); }
        function quickNav(url) { openPage(url, url); }

        function goHome() {
            hub.style.display = 'flex';
            setTimeout(() => { hub.style.opacity = '1'; }, 5);
            frame.style.display = 'none';
            topbar.style.display = 'none';
            frame.src = 'about:blank';
            input.value = '';
        }

        function goBack() {
            if (frame.style.display === 'block') {
                try {
                    frame.contentWindow.history.back();
                } catch(e) {
                    console.log("Navegação segura restrita. Use o menu Home.");
                }
            }
        }

        function openLocalFile() { window.location.href = "ia.html"; }

        function toggleModal(id, show) { 
            document.getElementById(id).style.display = show ? 'flex' : 'none'; 
            if(id === 'settings-modal' && show) populateSettingsFields();
        }

        // UPLOAD DE IMAGEM DA GALERIA
        function handleImageUpload(inputEl) {
            const file = inputEl.files[0];
            if (file) {
                document.getElementById("file-label").innerText = `✓ ${file.name}`;
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64BgData = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function populateSettingsFields() {
            const rootStyles = getComputedStyle(document.documentElement);
            document.getElementById("cfgPrimary").value = rootStyles.getPropertyValue('--primary').trim();
            document.getElementById("cfgSearchEngine").value = currentEngine;
            renderShortcutManager();
        }

        function saveConfigurations() {
            const primaryColor = document.getElementById("cfgPrimary").value;
            currentEngine = document.getElementById("cfgSearchEngine").value;

            localStorage.setItem("ghost_ndj_primary", primaryColor);
            localStorage.setItem("ghost_ndj_engine", currentEngine);
            localStorage.setItem("ghost_ndj_shortcuts", JSON.stringify(userShortcuts));
            if(base64BgData) localStorage.setItem("ghost_ndj_bg_gallery", base64BgData);

            applyTheme(primaryColor, base64BgData);
            renderShortcuts();
            toggleModal('settings-modal', false);
        }

        function applyTheme(primary, bgData) {
            document.documentElement.style.setProperty('--primary', primary);
            if(bgData) {
                document.documentElement.style.setProperty('--bg-image', `url('${bgData}')`);
            }
        }

        function loadSavedSettings() {
            const savedPrimary = localStorage.getItem("ghost_ndj_primary") || "#3b82f6";
            currentEngine = localStorage.getItem("ghost_ndj_engine") || "ghost";
            base64BgData = localStorage.getItem("ghost_ndj_bg_gallery") || "";
            
            const savedShortcuts = localStorage.getItem("ghost_ndj_shortcuts");
            if(savedShortcuts) userShortcuts = JSON.parse(savedShortcuts);
            else userShortcuts = [...defaultShortcuts];

            applyTheme(savedPrimary, base64BgData);
        }

        function updateThemePreview() {
            const primaryColor = document.getElementById("cfgPrimary").value;
            document.documentElement.style.setProperty('--primary', primaryColor);
        }

        // GERENCIADOR DE ATALHOS RÁPIDOS
        function renderShortcuts() {
            const container = document.getElementById("shortcuts-display");
            container.innerHTML = "";
            userShortcuts.forEach(item => {
                const div = document.createElement("div");
                div.className = "shortcut-item";
                div.onclick = () => quickNav(item.url);
                div.innerHTML = `
                    <div class="icon-circle">${item.icon || "🌐"}</div>
                    <span style="font-size:12px; opacity:0.85; font-weight: 500;">${item.name}</span>
                `;
                container.appendChild(div);
            });
        }

        function renderShortcutManager() {
            const listContainer = document.getElementById("shortcut-manager-list");
            listContainer.innerHTML = "";
            if(userShortcuts.length === 0) {
                listContainer.innerHTML = `<div style="font-size:12px; color:#666; text-align:center; padding:5px;">Sem atalhos</div>`;
                return;
            }
            userShortcuts.forEach((item, index) => {
                const row = document.createElement("div");
                row.className = "shortcut-manager-item";
                row.innerHTML = `
                    <span>${item.name} <span style="color:#555; font-size:11px;">(${item.url.replace(/^https?:\/\//,'')})</span></span>
                    <button class="del-shortcut-btn" onclick="deleteShortcut(${index})">✕</button>
                `;
                listContainer.appendChild(row);
            });
        }

        function addNewShortcut() {
            const nameInp = document.getElementById("new-short-name");
            const urlInp = document.getElementById("new-short-url");
            let name = nameInp.value.trim();
            let url = urlInp.value.trim();
            if(!name || !url) return;
            if(!url.startsWith("http")) url = "https://" + url;
            let icon = url.includes("youtube.com") ? "▶️" : (url.includes("github.com") ? "🐙" : "🌐");
            userShortcuts.push({ name, url, icon });
            nameInp.value = ""; urlInp.value = "";
            renderShortcutManager();
        }

        function deleteShortcut(index) {
            userShortcuts.splice(index, 1);
            renderShortcutManager();
        }

        async function sharePage() {
            const currentUrl = frame.style.display === 'block' ? frame.src : window.location.href;
            try {
                if (navigator.share) await navigator.share({ title: 'Ghost-NDJ Browser', url: currentUrl });
                else { navigator.clipboard.writeText(currentUrl); alert("Copiado!"); }
            } catch (err) {}
        }
    </script>
</body>
</html>
